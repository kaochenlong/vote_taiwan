{% extends "candidates/base.html" %}

{% block content %}
    <h1>候選人列表</h1>

    <a href="{% url 'candidates:new' %}">新增候選人</a>

    <ul>
        {% for candidate in candidates %}
            <li>
                <a href="{% url 'candidates:show' candidate.id %}">{{ candidate.name }}</a>
                <a href="{% url 'candidates:edit' candidate.id %}">編輯</a>
            </li>
        {% endfor %}
    </ul>
{% endblock %}
