{% extends "candidates/base.html" %}

{% block content %}
    <h1>新增候選人</h1>

    <form action="{% url 'candidates:index' %}" method="post">
      {% csrf_token %}
      <div>
        <label for="name">姓名</label>
        <input type="text" name="name">
      </div>

      <div>
        <label for="party">政黨</label>
        <input type="text" name="party">
      </div>

      <div>
        <label for="party">年齡</label>
        <input type="number" name="age">
      </div>

      <div>
        <label for="introduction">簡介</label>
        <textarea name="introduction" rows="5"></textarea>
      </div>

      <div>
        <input type="submit" value="新增候選人" />
      </div>
    </form>
{% endblock %}
